title: "Chemical KG"
description: "A visual knowledge graph portal for desulfurization and denitrification operations."
repository: "xzx34/chemical-kg"
url: "https://xzx34.github.io"
baseurl: "/chemical-kg"
google_scholar_stats_use_cdn: false

author:
  name: "Chemical Knowledge Graph"
  avatar: "images/android-chrome-512x512.png"
  bio: "Desulfurization and denitrification operation knowledge graph."
  location: "Nantong, China"
  email: ""
  github: "xzx34"

include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "

"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: false
sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: Asia/Shanghai
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
compress_html:
  clippings: all
  ignore:
    envs: development
